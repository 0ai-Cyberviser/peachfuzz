name: PeachFuzz/CactusFuzz Edition CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-editions:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Unit tests
        run: pytest -q

      - name: PeachFuzz edition matrix
        run: peachfuzz editions

      - name: CactusFuzz local-lab smoke
        run: cactusfuzz --target local-lab --scope local-lab
