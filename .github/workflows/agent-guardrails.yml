name: Agent Guardrail Pack CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
    paths:
      - "src/cactusfuzz/guardrail_pack.py"
      - "src/cactusfuzz/cli.py"
      - "tests/test_guardrail_pack.py"
      - "docs/AGENT_GUARDRAILS.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  agent-guardrails:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - run: pytest -q tests/test_guardrail_pack.py tests/test_cactusfuzz.py
      - run: cactusfuzz --target local-lab --scope local-lab --pack agent-guardrails
      - run: cactusfuzz --target local-lab --scope local-lab --pack agent-guardrails --format markdown
